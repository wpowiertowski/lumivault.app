name: LumiVault
options:
  bundleIdPrefix: app.lumivault
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_DEFAULT_ISOLATION: MainActor
    PRODUCT_NAME: LumiVault
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true

schemes:
  LumiVault:
    build:
      targets:
        LumiVault: all
        LumiVaultTests: [test]
        LumiVaultUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LumiVaultTests
        - LumiVaultUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  LumiVault:
    type: application
    platform: macOS
    sources:
      - path: LumiVault
        excludes:
          - "**/*.entitlements"
          - Info.plist
          - Resources/LumiVault.help
      - path: LumiVault/Resources/LumiVault.help
        type: folder
        buildPhase: resources
    resources:
      - path: LumiVault/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: LumiVault/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.lumivault
        DEVELOPMENT_TEAM: 6AS496S47T
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        ICLOUD_CONTAINER_ENVIRONMENT: Production
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          CODE_SIGN_ENTITLEMENTS: LumiVault/LumiVault.Debug.entitlements
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          CODE_SIGN_ENTITLEMENTS: LumiVault/LumiVault.entitlements
  LumiVaultTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_MODULE_NAME: LumiVaultTests
    dependencies:
      - target: LumiVault
  LumiVaultUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_MODULE_NAME: LumiVaultUITests
    dependencies:
      - target: LumiVault
