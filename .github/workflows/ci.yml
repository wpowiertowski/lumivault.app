name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

# Cancel in-progress runs for the same PR/branch — prevents queuing
# multiple expensive macOS builds when commits are pushed rapidly.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SwiftPM and SourcePackages
        uses: actions/cache@v5
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Verify Xcode 26+
        shell: bash
        run: |
          set -euo pipefail
          XCODE_MAJOR="$(xcodebuild -version | awk '/Xcode/ { split($2, parts, "."); print parts[1] }')"
          if [[ "${XCODE_MAJOR}" -lt 26 ]]; then
            echo "Xcode 26+ is required to build macOS 26 targets. Found Xcode ${XCODE_MAJOR}."
            exit 1
          fi

      - name: Build macOS target
        run: |
          xcodebuild \
            -scheme LumiVault \
            -destination "generic/platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  test:
    name: Unit Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-test-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-test-
            ${{ runner.os }}-swiftpm-

      - name: Run tests
        run: swift test
